<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción a clase</title>
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <h1>Inscripción a clase</h1>
        <div id="claseInfo" class="clase-info" style="display: none;">
            <h2 id="claseNombre"></h2>
            <div class="fechas">
                <p><strong>Apertura:</strong> <span id="fechaApertura"></span></p>
                <p><strong>Cierre:</strong> <span id="fechaCierre"></span></p>
            </div>
            <button id="btnUnirse" class="btn-unirse">Unirse a la clase</button>
        </div>
        <div id="mensaje" class="mensaje" style="display: none;"></div>
        <div class="back-btn-container">
            <a href="../index.html" class="back-btn">← Volver al Menú Principal</a>
        </div>
    </div>

    <script src="/js/config/horarios.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const claseId = urlParams.get('claseId');
        if (!claseId) {
            alert('Error: No se especificó la clase');
            window.location.href = '/index.html';
        }
        window.CLASE_ID = claseId;
    </script>
    <script src="/js/formularios.js"></script>
</body>
</html>
